# RFID WMS Windows 构建自动化
name: Build Windows Installer

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g pkg
          cd backend
          npm install

      - name: Build Windows executable
        run: |
          cd backend
          pkg server.js --targets node18-win-x64 --output ../RFID-WMS.exe

      - name: Prepare distribution files
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item RFID-WMS.exe dist/
          Copy-Item backend/index.html dist/
          Copy-Item public -Recurse dist/
          Compress-Archive -Path dist/* -DestinationPath RFID-WMS-Windows-Package.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RFID-WMS-Windows-Package.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}