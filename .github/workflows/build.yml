# RFID WMS Windows 安装程序构建
name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # 3. 编译 exe
      - name: Build Windows executable
        shell: cmd
        run: |
          npm install -g pkg
          cd rfid-wms/backend
          mkdir build
          npm install
          pkg server.js --targets node18-win-x64 --output ./build/RFID-WMS.exe

      # 4. 准备发行文件
      - name: Prepare distribution files
        shell: cmd
        run: |
          cd rfid-wms

          :: Web 前端
          if not exist backend\build\web mkdir backend\build\web
          copy /Y index.html backend\build\web\

          :: 静态资源
          if not exist backend\build\public mkdir backend\build\public
          xcopy /E /I /Y public backend\build\public

          :: 配置与脚本
          copy /Y backend\config.ini backend\build\
          copy /Y backend\start.bat backend\build\
          copy /Y backend\stop.bat backend\build\
          copy /Y backend\uninstall-firewall.bat backend\build\

          :: 运行时空目录
          if not exist backend\build\data mkdir backend\build\data
          if not exist backend\build\logs mkdir backend\build\logs
          if not exist backend\build\scan_files mkdir backend\build\scan_files
          if not exist backend\build\exports mkdir backend\build\exports
          if not exist backend\build\uploads mkdir backend\build\uploads

          :: sql.js WASM
          if exist backend\node_modules\sql.js\dist (
            if not exist backend\build\node_modules\sql.js\dist mkdir backend\build\node_modules\sql.js\dist
            xcopy /E /I /Y backend\node_modules\sql.js\dist backend\build\node_modules\sql.js\dist
          )

          :: ISS 脚本
          copy /Y dist\rfid-wms-setup.iss backend\build\

      # 5. 验证
      - name: Verify build directory
        shell: cmd
        run: |
          dir rfid-wms\backend\build /b
          if not exist rfid-wms\backend\build\RFID-WMS.exe exit 1

      # 6. 安装 Inno Setup
      - name: Install Inno Setup
        run: choco install innosetup -y
        shell: cmd

      # 7. 复制中文语言文件
      - name: Copy Chinese language file
        run: copy rfid-wms\Languages\ChineseSimplified.isl "C:\Program Files (x86)\Inno Setup 6\Languages\"
        shell: cmd

      # 8. 编译安装向导（ISCC 默认输出到 rfid-wms/dist/，改为根目录）
      - name: Compile Inno Setup installer
        run: '"C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O. rfid-wms\dist\rfid-wms-setup.iss'
        shell: cmd

      # 9. 验证 exe 生成（ISCC /O. 输出到仓库根目录）
      - name: Verify installer
        run: |
          dir RFID资产盘点-Setup-1.0.0.exe
        shell: cmd

      # 10. 打包 ZIP
      - name: Package ZIP
        run: powershell -Command "Compress-Archive -Path 'rfid-wms\backend\build\*' -DestinationPath 'RFID-WMS-Package.zip' -Force"
        shell: cmd

      # 11. 上传到 Release
      - name: Upload to Release
        run: |
          powershell -Command "Write-Host 'Uploading assets...'"
          curl -s -X POST -H "Authorization: token %GITHUB_TOKEN%" -H "Content-Type: application/octet-stream" --data-binary "@RFID资产盘点-Setup-1.0.0.exe" "https://uploads.github.com/repos/qw956/rfid-wms/releases/309626145/assets?name=RFID%E8%B5%84%E4%BA%A7%E7%9B%98%E7%82%B9-Setup-1.0.0.exe"
          curl -s -X POST -H "Authorization: token %GITHUB_TOKEN%" -H "Content-Type: application/zip" --data-binary "@RFID-WMS-Package.zip" "https://uploads.github.com/repos/qw956/rfid-wms/releases/309626145/assets?name=RFID-WMS-Package.zip"
        shell: cmd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
