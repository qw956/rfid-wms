# RFID WMS Windows 构建自动化
name: Build Windows Installer

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g pkg
          cd rfid-wms/backend
          npm install
        shell: cmd

      - name: Build Windows executable
        run: |
          cd rfid-wms/backend
          pkg server.js --targets node18-win-x64 --output ../../RFID-WMS.exe
        shell: cmd

      - name: Prepare distribution files
        run: |
          mkdir dist
          move RFID-WMS.exe dist\
          copy rfid-wms\backend\index.html dist\
          xcopy /E /I rfid-wms\public dist\
          powershell -Command "Compress-Archive -Path dist\* -DestinationPath RFID-WMS-Windows-Package.zip -Force"
        shell: cmd

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            RFID-WMS-Windows-Package.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact to repo
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git checkout main
          powershell -Command "Compress-Archive -Path 'dist\*' -DestinationPath 'RFID-WMS-Windows-Package.zip' -Force"
          git add -f RFID-WMS-Windows-Package.zip
          git commit -m "Update Windows package $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/qw956/rfid-wms.git main
        shell: cmd